name: Sync GompeiLib

on:
  workflow_call:
    secrets:
      GOMPEILIB_SYNC:
        required: true
    inputs:
      direction:
        required: true
        type: string   # "pull" or "push"

      branch_prefix:
        required: false
        type: string
        default: "gompeilib-sync"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # Identify repos based on direction
      - name: Set source and target repos
        run: |
          if [ "${{ inputs.direction }}" = "pull" ]; then
            echo "SOURCE_REPO=Team-190/GompeiLib" >> $GITHUB_ENV
            echo "TARGET_REPO=$GITHUB_REPOSITORY" >> $GITHUB_ENV
            echo "SOURCE_PATH=gompeilib" >> $GITHUB_ENV
            echo "TARGET_PATH=repoA" >> $GITHUB_ENV
          else
            echo "SOURCE_REPO=$GITHUB_REPOSITORY" >> $GITHUB_ENV
            echo "TARGET_REPO=Team-190/GompeiLib" >> $GITHUB_ENV
            echo "SOURCE_PATH=repoA" >> $GITHUB_ENV
            echo "TARGET_PATH=gompeilib" >> $GITHUB_ENV
          fi

      # Checkout SOURCE repo
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          path: ${{ env.SOURCE_PATH }}

      # Checkout TARGET repo
      - name: Checkout target
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          path: ${{ env.TARGET_PATH }}

      # Sync files (correct architecture)
      - name: Sync files
        run: |
          if [ "${{ inputs.direction }}" = "pull" ]; then
            echo "Pull: GompeiLib → Repo A/lib"

            rsync -a --delete \
              --exclude=".gradle/" \
              --exclude="build/" \
              --exclude=".git/" \
              $SOURCE_PATH/ $TARGET_PATH/lib/

          else
            echo "Push: Repo A/lib → GompeiLib"

            rsync -a --delete \
              --exclude=".gradle/" \
              --exclude="build/" \
              --exclude=".git/" \
              $SOURCE_PATH/lib/ $TARGET_PATH/
          fi

      # Create PR branch in TARGET repo
      - name: Create branch and commit
        run: |
          cd $TARGET_PATH

          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          BRANCH="${{ inputs.branch_prefix }}-$TIMESTAMP"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b "$BRANCH"

          git add -A
          git commit -m "GompeiLib sync (${{ inputs.direction }}) $TIMESTAMP" || echo "No changes"

      # Push PR branch
      - name: Push branch
        run: |
          cd $TARGET_PATH

          git remote set-url origin https://x-access-token:${GOMPEILIB_SYNC}@github.com/$TARGET_REPO.git

          git push origin "$BRANCH"
        env:
          GOMPEILIB_SYNC: ${{ secrets.GOMPEILIB_SYNC }}

      # Open PR in TARGET repo
      - name: Create Pull Request
        run: |
          gh pr create \
            --repo "$TARGET_REPO" \
            --head "$BRANCH" \
            --base main \
            --title "GompeiLib sync (${{ inputs.direction }})" \
            --body "Automated bidirectional sync between Repo A and GompeiLib"
        env:
          GH_TOKEN: ${{ github.token }}